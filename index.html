<!DOCTYPE html>
<html>
<head>
    <title>Matchmaker 2026</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f4f4f4;
            text-align: center;
        }
        .box {
            background: white;
            padding: 20px;
            margin: 50px auto;
            width: 350px;
            border-radius: 10px;
        }
        input {
            margin: 5px;
            padding: 5px;
        }
        button {
            padding: 10px;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>Matchmaker 2026</h2>

    <p>
        Please answer each question from 1–5.<br>
        5 = strongly agree, 1 = strongly disagree.
    </p>

    <input id="q1" placeholder="Chicago Sports Teams are the Best"><br>
    <input id="q2" placeholder="Best breakfast is scrambled eggs"><br>
    <input id="q3" placeholder="I love outdoor activities"><br>
    <input id="q4" placeholder="I like to travel"><br>
    <input id="q5" placeholder="Pineapple on pizza?"><br>

    <button onclick="calculate()">Submit</button>

    <pre id="output"></pre>
</div>

<script>
// constants (Requirement 4)
const MAX_SCORE = 5;

// validate function
function validate(value) {
    if (value === "" || isNaN(value) || value < 1 || value > 5) {
        return false;
    }
    return true;
}

function calculate() {

    let userResponse1 = document.getElementById("q1").value;
    let userResponse2 = document.getElementById("q2").value;
    let userResponse3 = document.getElementById("q3").value;
    let userResponse4 = document.getElementById("q4").value;
    let userResponse5 = document.getElementById("q5").value;

    let responses = [userResponse1, userResponse2, userResponse3, userResponse4, userResponse5];

    // validate all inputs
    for (let i = 0; i < responses.length; i++) {
        if (!validate(responses[i])) {
            document.getElementById("output").innerText =
                "❌ Please enter numbers between 1 and 5 for all questions.";
            return;
        }
    }

    // convert to numbers
    userResponse1 = Number(userResponse1);
    userResponse2 = Number(userResponse2);
    userResponse3 = Number(userResponse3);
    userResponse4 = Number(userResponse4);
    userResponse5 = Number(userResponse5);

    // your SAME logic
    let desiredResponse1 = 5;
    let compatability1 = 5 - Math.abs(userResponse1 - desiredResponse1);

    let desiredResponse2 = 2;
    let compatability2 = 5 - Math.abs(userResponse2 - desiredResponse2);

    let desiredResponse3 = 5;
    let compatability3 = 5 - Math.abs(userResponse3 - desiredResponse3);

    let desiredResponse4 = 4;
    let compatability4 = 5 - Math.abs(userResponse4 - desiredResponse4);

    let desiredResponse5 = 1;
    let compatability5 = 5 - Math.abs(userResponse5 - desiredResponse5);

    let totalCompatibility = 
        (compatability1 + compatability2 + compatability3 + compatability4 + compatability5) * 25;

    let resultText =
        "Question 1 compatibility: " + compatability1 + "\n" +
        "Question 2 compatibility: " + compatability2 + "\n" +
        "Question 3 compatibility: " + compatability3 + "\n" +
        "Question 4 compatibility: " + compatability4 + "\n" +
        "Question 5 compatibility: " + compatability5 + "\n\n" +
        "Total Compatibility: " + totalCompatibility + "%\n";

    // closing remark (Requirement 3)
    if (totalCompatibility > 80) {
        resultText += "🔥 You are highly compatible!";
    } else if (totalCompatibility > 50) {
        resultText += "😊 You are somewhat compatible.";
    } else {
        resultText += "😬 Not very compatible.";
    }

    document.getElementById("output").innerText = resultText;
}
</script>

</body>
</html>
